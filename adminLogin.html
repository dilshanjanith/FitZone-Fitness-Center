<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Admin | FitZone</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body class="signup-page">
    <div class="signup-container">
      <!-- Left side image -->
      <div class="signup-image">
        <img src="assets/logingimg.webp" alt="Fitness Image" />
      </div>

      <!-- Right side form -->
      <div class="signup-form">
        <h2>Sign in to </br> FitZone As Admin</h2>

        <form>
          <input id="admin-email" type="email" placeholder="Email" />
          <input id="admin-password" type="password" placeholder="Password" />
          <button id="admin-login-btn" type="submit">Login</button>
          <p id="login-error" style="color: red; display: none;"></p>
        </form>
      </div>
    </div>
  </body>
</html>
