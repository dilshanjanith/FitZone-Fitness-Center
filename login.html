<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | FitZone</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/login.js" defer></script>
  </head>
  <body class="signup-page">
    <div class="signup-container">
      <!-- Left side image -->
      <div class="signup-image">
        <img src="assets/logingimg.webp" alt="Fitness Image" />
      </div>

      <!-- Right side form -->
      <div class="signup-form">
        <h2>Sign in to <br />FitZone</h2>

        <form id="login-form" novalidate autocomplete="off">
          <div class="field-wrapper">
            <input
              type="email"
              id="login-email"
              placeholder="Email"
              autocomplete="off"
            />
            <label class="error" id="login-email-error"></label>
          </div>

          <div class="field-wrapper">
            <input
              type="password"
              id="login-password"
              placeholder="Password"
              autocomplete="off"
            />
            <label class="error" id="login-password-error"></label>
          </div>

          <div class="field-wrapper">
            <label class="error" id="login-error"></label>
          </div>

          <button id="login-btn" type="submit">Login</button>
        </form>

        <p class="signup-link">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </div>
    </div>
  </body>
</html>
