<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up | FitZone</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="js/signup.js" defer></script>
  </head>
  <body class="signup-page">
    <div class="signup-container">
      <!-- Left side image -->
    <div class="signup-image">
      <img src="assets/fitness.webp" alt="Fitness Image" />
    </div>

      <!-- Right side form -->
      <div class="signup-form">
        <h2>Sign up to FitZone </br> Fitness Center</h2>

        <div class="social-login">
          <i class="fa-brands fa-google fa-2x"></i>
          <i class="fa-brands fa-facebook fa-2x"></i>
          <i class="fa-brands fa-apple fa-2x"></i>
        </div>

        <p class="divider"><span>------------</span> or sign up with <span>------------</span></p>

        <form id="signup-form" novalidate>
          <div class="field-wrapper">
            <input type="text" id="first-name" placeholder="First Name" />
            <label class="error" id="first-name-error"></label>
          </div>

          <div class="field-wrapper">
            <input type="text" id="last-name" placeholder="Last Name" />
            <label class="error" id="last-name-error"></label>
          </div>

          <div class="field-wrapper">
            <input type="email" id="email" placeholder="Email" />
            <label class="error" id="email-error"></label>
          </div>

          <div class="field-wrapper">
            <input type="password" id="password" placeholder="Password" />
            <label class="error" id="password-error"></label>
          </div>

          <button type="submit">Sign Up</button>
        </form>

        <p class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </body>
</html>
