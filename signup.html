<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up | FitZone</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="js/main.js" defer></script>
  </head>
  <body class="signup-page">
    <div class="signup-container">
      <!-- Left side image -->
      <div class="signup-image">
        <img src="assets/fitness.jpg" alt="Fitness Image" />
      </div>

      <!-- Right side form -->
      <div class="signup-form">
        <h2>Sign up to FitZone </br> Fitness Center</h2>

        <div class="social-login">
          <i class="fa-brands fa-google fa-2x"></i>
          <i class="fa-brands fa-facebook fa-2x"></i>
          <i class="fa-brands fa-apple fa-2x"></i>
        </div>

        <p class="divider"><span>------------</span> or sign up with <span>------------</span></p>

        <form>
          <div class="name-fields">
            <input type="text" placeholder="First Name" />
            <input type="text" placeholder="Last Name" />
          </div>
          <input type="email" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <button type="submit">Sign up</button>
        </form>

        <p class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </body>
</html>
